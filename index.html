<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ikumiCraft - Floating Princess Dream</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Mitr:wght@300;400;500&family=Itim&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'soft-blush': '#FFF0F5',
                        'fairy-pink': '#FFC0CB',
                        'sakura-light': '#FFD1DC',
                        'champagne-gold': '#E7D2A9',
                        'dusty-rose': '#B784A7',
                    },
                    boxShadow: {
                        'glow': '0 0 20px rgba(255, 182, 193, 0.4)',
                        'inner-white': 'inset 0 0 15px rgba(255, 255, 255, 0.8)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Mitr', sans-serif;
            background: linear-gradient(180deg, #FFF5F7 0%, #FEEAF0 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #8B5A6D;
        }

        .misty-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(255, 255, 255, 0.5) 100%);
            pointer-events: none;
            z-index: 10;
        }

        .font-cute { font-family: 'Itim', cursive; }
        .font-eng { font-family: 'Fredoka', sans-serif; }

        .glass-princess {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(255, 192, 203, 0.2);
        }

        .dreamy-border {
            border: 4px double rgba(231, 210, 169, 0.5);
        }

        .btn-sparkle {
            background: linear-gradient(45deg, #FFD1DC, #E7D2A9);
            border: 2px solid white;
            box-shadow: 0 0 15px rgba(231, 210, 169, 0.3);
            color: #8B5A6D;
        }

        .float-slow { animation: float-slow 6s ease-in-out infinite; }
        @keyframes float-slow {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(5px, -15px) rotate(2deg); }
            66% { transform: translate(-5px, -10px) rotate(-1deg); }
        }

        .brand-name {
            background: linear-gradient(to bottom, #E7D2A9 0%, #B784A7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(255, 255, 255, 1));
        }

        .queue-card {
            background: white;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #FFD1DC;
        }
    </style>
</head>
<body class="py-10 px-4">
    <div class="misty-overlay"></div>

    <div class="fixed top-20 left-10 text-4xl float-slow opacity-50">☁️</div>
    <div class="fixed top-1/3 right-10 text-5xl float-slow opacity-40" style="animation-delay: 2s">✨</div>
    <div class="fixed bottom-20 left-1/4 text-4xl float-slow opacity-30" style="animation-delay: 4s">🌸</div>
    <div class="fixed bottom-10 right-5 text-4xl float-slow opacity-50">🦢</div>

    <main class="max-w-xl mx-auto space-y-8 relative z-20">
        
        <header class="text-center relative">
            <div class="mb-4 inline-block relative">
                <div class="absolute inset-0 bg-sakura-light blur-3xl opacity-30 animate-pulse"></div>
                <span class="text-6xl block mb-2 float-slow">🪄</span>
                <h1 class="font-eng text-5xl md:text-6xl font-bold brand-name tracking-tight">
                    ikumiCraft
                </h1>
                <div class="h-1 w-32 bg-gradient-to-r from-transparent via-champagne-gold to-transparent mx-auto mt-2"></div>
            </div>
            <p class="font-cute text-2xl text-dusty-rose/80">ตารางคิวงานคราฟต์เจ้าหญิง ✨</p>
        </header>

        <section class="glass-princess dreamy-border p-6 relative overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-cute text-2xl text-dusty-rose font-bold">💖 คิวงานทั้งหมด 💖</h2>
                <span id="queueCount" class="text-xs bg-fairy-pink px-3 py-1 rounded-full text-white">...</span>
            </div>
            
            <div id="queueList" class="space-y-4 max-h-[60vh] overflow-y-auto pr-2">
                <p id="loadingText" class="text-center text-dusty-rose/60 italic">กำลังโหลดคิวงาน...</p>
            </div>
        </section>

        <footer class="text-center space-y-6 pb-10">
            <div class="flex justify-center items-center gap-4">
                <div class="h-[1px] w-12 bg-sakura-light"></div>
                <p class="font-cute text-dusty-rose">ติดต่อเจ้าหญิงจูได้ที่</p>
                <div class="h-[1px] w-12 bg-sakura-light"></div>
            </div>
            <div class="flex justify-center gap-6">
                <a href="#" class="btn-sparkle w-12 h-12 rounded-full flex items-center justify-center text-lg">f</a>
                <a href="#" class="btn-sparkle w-12 h-12 rounded-full flex items-center justify-center text-lg">ig</a>
                <a href="#" class="btn-sparkle w-12 h-12 rounded-full flex items-center justify-center text-lg">Line</a>
            </div>
            <p class="font-eng text-[8px] uppercase tracking-[0.3em] text-dusty-rose/50">Created with Magic by ikumiCraft</p>
        </footer>
    </main>

    <script>
        const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbyEA5QIas9nzc6m8QyE_k9fzPrqM-aIXoL5C95SUXSQwveOLOb_tfHuhJiZPTtfit9M/exec";

        async function fetchQueueData() {
            const queueList = document.getElementById('queueList');
            const countEl = document.getElementById('queueCount');

            try {
                const response = await fetch(SHEET_API_URL);
                const queueData = await response.json();
                
                queueList.innerHTML = "";
                countEl.innerText = `${queueData.length} คิว`;

                if (queueData.length === 0) {
                    queueList.innerHTML = `<p class="text-center text-dusty-rose/50 py-10">ยังไม่มีคิวงานค๊า 🌸</p>`;
                    return;
                }

                queueData.forEach((item, index) => {
                    let statusColor = "#B784A7";
                    if(item.status.includes("เสร็จ")) statusColor = "#4CAF50";
                    else if(item.status.includes("คราฟต์") || item.status.includes("ทำ")) statusColor = "#FF69B4";

                    const card = document.createElement('div');
                    card.className = "queue-card shadow-sm border-l-4";
                    card.style.borderLeftColor = statusColor;

                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-[9px] uppercase text-dusty-rose/60">ID: ${item.id || (index+1)}</p>
                                <h3 class="font-bold text-dusty-rose text-lg">คุณ ${item.name}</h3>
                            </div>
                            <span class="text-[10px] font-bold px-3 py-1 rounded-full border" style="color: ${statusColor}; border-color: ${statusColor}">
                                ${item.status}
                            </span>
                        </div>
                        <div class="mt-2 pt-2 border-t border-dashed border-dusty-rose/10">
                            <p class="text-xs italic text-dusty-rose/80">✨ ${item.details || 'กำลังดำเนินการค่ะ'}</p>
                        </div>
                    `;
                    queueList.appendChild(card);
                });
            } catch (error) {
                queueList.innerHTML = `<p class="text-center text-red-400 py-10">ไม่สามารถเชื่อมต่อข้อมูลได้</p>`;
            }
        }
        fetchQueueData();
    </script>
</body>
</html>
