<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ikumiCraft - Floating Princess Dream</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Mitr:wght@300;400;500&family=Itim&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'soft-blush': '#FFF0F5',
                        'fairy-pink': '#FFC0CB',
                        'sakura-light': '#FFD1DC',
                        'champagne-gold': '#E7D2A9',
                        'dusty-rose': '#B784A7',
                    },
                    boxShadow: {
                        'glow': '0 0 20px rgba(255, 182, 193, 0.4)',
                        'inner-white': 'inset 0 0 15px rgba(255, 255, 255, 0.8)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Mitr', sans-serif;
            background: linear-gradient(180deg, #FFF5F7 0%, #FEEAF0 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #8B5A6D;
        }
        .misty-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(255, 255, 255, 0.5) 100%);
            pointer-events: none;
            z-index: 10;
        }
        .font-cute { font-family: 'Itim', cursive; }
        .font-eng { font-family: 'Fredoka', sans-serif; }
        .glass-princess {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(255, 192, 203, 0.2);
        }
        .dreamy-border { border: 4px double rgba(231, 210, 169, 0.5); }
        .btn-sparkle {
            background: linear-gradient(45deg, #FFD1DC, #E7D2A9);
            border: 2px solid white;
            color: #8B5A6D;
        }
        .float-slow { animation: float-slow 6s ease-in-out infinite; }
        @keyframes float-slow {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(5px, -15px) rotate(2deg); }
            66% { transform: translate(-5px, -10px) rotate(-1deg); }
        }
        .brand-name {
            background: linear-gradient(to bottom, #E7D2A9 0%, #B784A7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .queue-card {
            background: white;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #FFD1DC;
        }
        input, select {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #FFD1DC;
            border-radius: 12px;
            padding: 8px 12px;
            outline: none;
            color: #8B5A6D;
        }
    </style>
</head>
<body class="py-10 px-4">
    <div class="misty-overlay"></div>
    <main class="max-w-xl mx-auto space-y-8 relative z-20">
        
        <header class="text-center relative">
            <span class="text-6xl block mb-2 float-slow">🪄</span>
            <h1 class="font-eng text-5xl md:text-6xl font-bold brand-name tracking-tight">ikumiCraft</h1>
            <p class="font-cute text-2xl text-dusty-rose/80">ตารางคิวงานคราฟต์เจ้าหญิง ✨</p>
        </header>

        <section class="glass-princess dreamy-border p-6 relative">
            <div class="grid grid-cols-1 gap-4 mb-6">
                <!-- ค้นหาชื่อ -->
                <input type="text" id="searchName" placeholder="🔍 ค้นหาชื่อลูกค้า..." oninput="filterQueues()">
                
                <div class="grid grid-cols-2 gap-2">
                    <!-- เลือกวันที่ -->
                    <input type="date" id="filterDate" onchange="filterQueues()">
                    <!-- ตัวกรองสถานะ -->
                    <select id="filterStatus" onchange="filterQueues()">
                        <option value="">ทั้งหมด</option>
                        <option value="ยังไม่เริ่ม">ยังไม่เริ่ม</option>
                        <option value="เริ่มงาน">เริ่มงาน</option>
                        <option value="รอเช็ค">รอเช็ค</option>
                        <option value="แก้งาน">แก้งาน</option>
                        <option value="เสร็จแล้ว">เสร็จแล้ว</option>
                    </select>
                </div>
            </div>

            <div class="flex justify-between items-center mb-6">
                <h2 class="font-cute text-2xl text-dusty-rose font-bold">💖 คิวงาน 💖</h2>
                <span id="queueCount" class="text-xs bg-fairy-pink px-3 py-1 rounded-full text-white">...</span>
            </div>
            
            <div id="queueList" class="space-y-4 max-h-[60vh] overflow-y-auto pr-2">
                <p id="loadingText" class="text-center text-dusty-rose/60 italic">กำลังโหลดคิวงาน...</p>
            </div>
        </section>

        <footer class="text-center space-y-6 pb-10">
            <div class="flex justify-center gap-6">
                <a href="#" class="btn-sparkle w-12 h-12 rounded-full flex items-center justify-center text-lg">f</a>
                <a href="#" class="btn-sparkle w-12 h-12 rounded-full flex items-center justify-center text-lg">ig</a>
                <a href="#" class="btn-sparkle w-12 h-12 rounded-full flex items-center justify-center text-lg">Line</a>
            </div>
            <p class="font-eng text-[8px] uppercase tracking-[0.3em] text-dusty-rose/50">Created with Magic by ikumiCraft</p>
        </footer>
    </main>

    <script>
        const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbyEA5QIas9nzc6m8QyE_k9fzPrqM-aIXoL5C95SUXSQwveOLOb_tfHuhJiZPTtfit9M/exec";
        let allData = [];

        async function fetchQueueData() {
            try {
                const response = await fetch(SHEET_API_URL);
                allData = await response.json();
                filterQueues();
            } catch (error) {
                document.getElementById('queueList').innerHTML = `<p class="text-center text-red-400 py-10">ไม่สามารถเชื่อมต่อข้อมูลได้</p>`;
            }
        }

        function filterQueues() {
            const nameQuery = document.getElementById('searchName').value.toLowerCase();
            const dateQuery = document.getElementById('filterDate').value;
            const statusQuery = document.getElementById('filterStatus').value;
            const queueList = document.getElementById('queueList');
            const countEl = document.getElementById('queueCount');

            const filtered = allData.filter(item => {
                const matchName = item.name.toLowerCase().includes(nameQuery);
                const matchStatus = statusQuery === "" || item.status === statusQuery;
                
                // สมมติว่าใน JSON มีฟิลด์ date (YYYY-MM-DD)
                // หากไม่มีฟิลด์ date ใน Google Sheet ระบบวันที่อาจไม่ทำงานจนกว่าจะเพิ่มคอลัมน์ date
                const matchDate = !dateQuery || (item.date && item.date.includes(dateQuery));
                
                return matchName && matchStatus && matchDate;
            });

            queueList.innerHTML = "";
            countEl.innerText = `${filtered.length} คิว`;

            if (filtered.length === 0) {
                queueList.innerHTML = `<p class="text-center text-dusty-rose/50 py-10">ไม่พบคิวที่ค้นหา 🌸</p>`;
                return;
            }

            filtered.forEach((item, index) => {
                let statusColor = "#B784A7";
                if(item.status === "เสร็จแล้ว") statusColor = "#4CAF50";
                else if(item.status === "แก้งาน") statusColor = "#FF9800";
                else if(item.status === "เริ่มงาน") statusColor = "#FF69B4";
                else if(item.status === "รอเช็ค") statusColor = "#9C27B0";

                const card = document.createElement('div');
                card.className = "queue-card shadow-sm border-l-4";
                card.style.borderLeftColor = statusColor;

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[9px] uppercase text-dusty-rose/60">ID: ${item.id || (index+1)} ${item.date ? '| ' + item.date : ''}</p>
                            <h3 class="font-bold text-dusty-rose text-lg">คุณ ${item.name}</h3>
                        </div>
                        <span class="text-[10px] font-bold px-3 py-1 rounded-full border" style="color: ${statusColor}; border-color: ${statusColor}">
                            ${item.status}
                        </span>
                    </div>
                    <div class="mt-2 pt-2 border-t border-dashed border-dusty-rose/10">
                        <p class="text-xs italic text-dusty-rose/80">✨ ${item.details || 'กำลังดำเนินการค่ะ'}</p>
                    </div>
                `;
                queueList.appendChild(card);
            });
        }

        fetchQueueData();
    </script>
</body>
</html>
